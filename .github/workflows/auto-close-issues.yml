name: Auto Close Issues

on:
  issues:
    types: [labeled]

jobs:
  close-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: github.event.label.name == 'completed' || github.event.label.name == 'wontfix'
    
    steps:
      - name: Close issue with label ${{ github.event.label.name }}
        run: |
          echo "Closing issue #${{ github.event.issue.number }} with label '${{ github.event.label.name }}'"
          
      - name: Close the issue via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X PATCH \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }} \
            -d '{"state": "closed"}'